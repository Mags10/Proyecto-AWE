<section class="modal-backdrop" role="presentation" (click)="close()" (keydown.escape)="close()">
  <z-card
    #dialogSurface
    class="modal-card"
    zTitle="Restablecer contraseña"
    role="dialog"
    aria-modal="true"
    aria-label="Restablecer contraseña"
    tabindex="-1"
    (click)="$event.stopPropagation()"
  >
    <form class="modal-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <p class="modal-copy">
        Nueva contraseña para <strong>{{ user().name }}</strong>.
      </p>

      <label>
        Nueva contraseña
        <input z-input type="password" formControlName="password" placeholder="Mínimo 8 caracteres" />
      </label>

      @if (error()) {
        <div class="modal-error">{{ error() }}</div>
      }

      <footer class="modal-actions">
        <button z-button zType="outline" type="button" (click)="close()">Cancelar</button>
        <button z-button type="submit" [zLoading]="saving()">Actualizar contraseña</button>
      </footer>
    </form>
  </z-card>
</section>
